<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ERICA 유학생 게시판</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* 상단 */
.top-banner {
  background: #1e3a8a;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* 전체 */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* 왼쪽 */
.sidebar {
  width: 200px;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.sidebar-banner {
  width: 100%;
  margin-top: 20px;
  cursor: pointer;
  border-radius: 8px;
}

/* 중앙 */
.center {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.item {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 오른쪽 */
.detail {
  width: 320px;
  border-left: 1px solid #ddd;
  padding: 10px;
  overflow-y: auto;
}

/* 모달 */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 500px;
  padding: 20px;
  border-radius: 10px;
}

.modal-content input,
.modal-content textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}

.modal-content textarea {
  height: 200px;
  resize: none;
}
</style>

</head>

<body>

<div class="top-banner">ERICA 공지사항</div>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">
    <button onclick="loadNotices()">공지사항</button>
    <button onclick="loadGroups()">모임게시판</button>
    <button onclick="alert('준비중입니다')">유학생 지원 프로그램</button>

    <!-- 배너 -->
    <a href="https://global.hanyang.ac.kr/?intro_non" target="_blank">
      <img src="international-banner.png" class="sidebar-banner">
    </a>
  </div>

  <!-- CENTER -->
  <div class="center">
    <button onclick="createPost()">글쓰기</button>
    <div id="list"></div>
  </div>

  <!-- RIGHT -->
  <div class="detail">
    <h3>상세 보기</h3>
    <div id="detailBox"></div>
  </div>

</div>

<!-- 글쓰기 모달 -->
<div id="writeModal" class="modal">
  <div class="modal-content">
    <h2>글쓰기</h2>
    <input id="writeTitle" placeholder="제목" />
    <textarea id="writeContent" placeholder="내용"></textarea>

    <button onclick="submitPost()">등록</button>
    <button onclick="closeModal()">닫기</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* 🔥 Firebase 설정 (여기만 수정) */
const firebaseConfig = {
  apiKey: "AIzaSyCcvEq1CdRVl35RdTxnMmqvxvP7W6fwYp8",
  authDomain: "hyericanotictranslator.firebaseapp.com",
  projectId: "hyericanotictranslator",
  storageBucket: "hyericanotictranslator.firebasestorage.app",
  messagingSenderId: "520674515470",
  appId: "1:520674515470:web:b00c1309a18410cc64ba5f",
  measurementId: "G-9MSK18NM6Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCollection = "notices";

/* 글쓰기 열기 */
window.createPost = () => {
  document.getElementById("writeModal").style.display = "flex";
};

/* 닫기 */
window.closeModal = () => {
  document.getElementById("writeModal").style.display = "none";
};

/* 글 등록 */
window.submitPost = async () => {
  const title = document.getElementById("writeTitle").value;
  const content = document.getElementById("writeContent").value;

  if (!title || !content) return;

  await addDoc(collection(db, currentCollection), {
    title,
    content,
    createdAt: serverTimestamp()
  });

  document.getElementById("writeTitle").value = "";
  document.getElementById("writeContent").value = "";

  closeModal();
};

/* 공지 */
window.loadNotices = () => {
  currentCollection = "notices";
  listen();
};

/* 모임 */
window.loadGroups = () => {
  currentCollection = "groups";
  listen();
};

/* 리스트 */
function listen() {
  const q = query(
    collection(db, currentCollection),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = data.title;

      div.onclick = () => {
        document.getElementById("detailBox").innerHTML = `
          <h2>${data.title}</h2>
          <p>${data.content}</p>
        `;
      };

      list.appendChild(div);
    });
  });
}

/* 첫 화면 안내 */
function showIntro() {
  document.getElementById("detailBox").innerHTML = `
    <h2>📌 환영합니다</h2>
    <p>
      안녕하세요. 이 사이트는 한양대학교 ERICA에 재학 중인 유학생들이
      교내 공지와 행사 정보를 보다 쉽게 확인하고 이해할 수 있도록 만든 게시판입니다.
    </p>
    <p>
      더 많은 유학생 지원 프로그램은 한양대학교 국제처 공식 사이트를 참고해 주세요.
    </p>
  `;
}

/* 초기 실행 */
loadNotices();
showIntro();

</script>

</body>
</html>
