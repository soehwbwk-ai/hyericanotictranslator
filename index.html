<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ERICA 유학생 플랫폼</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* 상단 */
.top-banner {
  background: #1e3a8a;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* 전체 */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* 좌측 */
.sidebar {
  width: 200px;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.sidebar-banner {
  width: 100%;
  margin-top: 20px;
  border-radius: 8px;
}

/* 중앙 (상세) */
.center {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

/* 우측 (리스트) */
.right {
  width: 320px;
  border-left: 1px solid #ddd;
  padding: 10px;
  overflow-y: auto;
}

.item {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 모달 */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 500px;
  padding: 20px;
  border-radius: 10px;
}

.modal-content input,
.modal-content textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
}

.modal-content textarea {
  height: 200px;
  resize: none;
}

/* 번역 */
.lang-box {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}

.lang-btn {
  padding: 8px 12px;
  cursor: pointer;
}

.lang-select {
  display: none;
  margin-top: 5px;
}
</style>

</head>

<body>

<div class="top-banner">ERICA 공지사항</div>

<!-- 번역 -->
<div class="lang-box">
  <button class="lang-btn" onclick="toggleLang()">🌐 번역</button>
  <select id="langSelect" class="lang-select" onchange="translatePage()">
    <option value="">언어 선택</option>
    <option value="ko">한국어</option>
    <option value="en">English</option>
    <option value="ja">日本語</option>
    <option value="zh-CN">中文</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="de">Deutsch</option>
    <option value="ru">Русский</option>
    <option value="vi">Tiếng Việt</option>
    <option value="th">ไทย</option>
    <option value="id">Bahasa Indonesia</option>
  </select>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">
    <button onclick="loadNotices()">공지사항</button>
    <button onclick="loadGroups()">모임게시판</button>
    <button onclick="alert('준비중')">유학생 지원 프로그램</button>

    <a href="https://global.hanyang.ac.kr/?intro_non" target="_blank">
      <img src="international-banner.png" class="sidebar-banner">
    </a>
  </div>

  <!-- CENTER (상세) -->
  <div class="center">
    <div id="detailBox"></div>
  </div>

  <!-- RIGHT (리스트) -->
  <div class="right">
    <button onclick="createPost()">글쓰기</button>
    <div id="list"></div>
  </div>

</div>

<!-- 모달 -->
<div id="writeModal" class="modal">
  <div class="modal-content">
    <h2>글쓰기</h2>
    <input id="writeTitle" placeholder="제목" />
    <textarea id="writeContent" placeholder="내용"></textarea>
    <button onclick="submitPost()">등록</button>
    <button onclick="closeModal()">닫기</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyCcvEq1CdRVl35RdTxnMmqvxvP7W6fwYp8",
  authDomain: "hyericanotictranslator.firebaseapp.com",
  projectId: "hyericanotictranslator",
  storageBucket: "hyericanotictranslator.firebasestorage.app",
  messagingSenderId: "520674515470",
  appId: "1:520674515470:web:b00c1309a18410cc64ba5f",
  measurementId: "G-9MSK18NM6Y"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCollection = "notices";

/* 글쓰기 */
window.createPost = () => {
  document.getElementById("writeModal").style.display = "flex";
};

window.closeModal = () => {
  document.getElementById("writeModal").style.display = "none";
};

window.submitPost = async () => {
  const title = document.getElementById("writeTitle").value;
  const content = document.getElementById("writeContent").value;
  if (!title || !content) return;
  await addDoc(collection(db, currentCollection), {
    title,
    content,
    createdAt: serverTimestamp()
  });

  closeModal();
};

/* 리스트 */
window.loadNotices = () => {
  currentCollection = "notices";
  listen();
};

window.loadGroups = () => {
  currentCollection = "groups";
  listen();
};

function listen() {
  const q = query(collection(db, currentCollection), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const d = doc.data();

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = d.title || "제목 없음";

      div.onclick = () => {
        document.getElementById("detailBox").innerHTML = `
          <h2>${d.title}</h2>
          <p>${formatText(d.content)}</p>
        `;
      };

      list.appendChild(div);
    });
  });
}

/* 🔥 줄바꿈 + 기본 서식 */
function formatText(text) {
  if (!text) return "";

  return text
    .replace(/\n/g, "<br>")
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");
}

/* 첫 화면 */
function showIntro() {
  document.getElementById("detailBox").innerHTML = `
    <h2>📌 환영합니다</h2>
    <p>
      안녕하세요. 이 사이트는 한양대학교 ERICA 유학생들이
      공지와 이벤트 정보를 쉽게 확인할 수 있도록 만든 플랫폼입니다.
    </p>
  `;
}

/* 초기 */
loadNotices();
showIntro();

/* 번역 */
window.toggleLang = () => {
  const sel = document.getElementById("langSelect");
  sel.style.display = sel.style.display === "block" ? "none" : "block";
};

async function translateText(text, lang) {
  const res = await fetch(
    `https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`
  );
  const data = await res.json();
  return data[0][0][0];
}

window.translatePage = async () => {
  const lang = document.getElementById("langSelect").value;
  if (!lang) return;

  const els = document.querySelectorAll("h2,p,button,div.item");

  for (let el of els) {
    if (!el.dataset.origin) el.dataset.origin = el.innerText;
    el.innerText = await translateText(el.dataset.origin, lang);
  }
};

</script>

</body>
</html>
