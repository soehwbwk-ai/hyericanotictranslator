<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>ERICA 유학생 게시판</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}
.sidebar-banner {
  width: 100%;
  margin-top: 20px;
  cursor: pointer;
  border-radius: 8px;
}
/* 상단 */
.top-banner {
  background: #1e3a8a;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
}

/* 전체 */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* 왼쪽 */
.sidebar {
  width: 200px;
  border-right: 1px solid #ddd;
  padding: 10px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 중앙 */
.center {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.item {
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* 오른쪽 */
.detail {
  width: 320px;
  border-left: 1px solid #ddd;
  padding: 10px;
  overflow-y: auto;
}

/* 배너 */
.side-banner {
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 120px;
  z-index: 9999;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="top-banner">ERICA 공지사항</div>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">
    <button onclick="loadNotices()">공지사항</button>
    <button onclick="loadGroups()">모임게시판</button>
    <button onclick="alert('준비중입니다')">유학생 지원 프로그램</button>
    <a href="https://global.hanyang.ac.kr/?intro_non" target="_blank">
      <img src="international-banner.png" class="sidebar-banner">
    </a>
  </div>

  <!-- CENTER -->
  <div class="center">
    <button onclick="createPost()">글쓰기</button>
    <div id="list"></div>
  </div>

  <!-- RIGHT -->
  <div class="detail">
    <h3>상세 보기</h3>
    <div id="detailBox"></div>
  </div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

/* 🔥 Firebase 설정 (너 걸로 교체) */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentCollection = "notices";

/* 글쓰기 */
window.createPost = async () => {
  const title = prompt("제목");
  const content = prompt("내용");

  if (!title || !content) return;

  await addDoc(collection(db, currentCollection), {
    title,
    content,
    createdAt: serverTimestamp()
  });
};

/* 공지 */
window.loadNotices = () => {
  currentCollection = "notices";
  listen();
};

/* 모임 */
window.loadGroups = () => {
  currentCollection = "groups";
  listen();
};

/* 리스트 */
function listen() {
  const q = query(
    collection(db, currentCollection),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, (snapshot) => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = data.title;

      div.onclick = () => {
        document.getElementById("detailBox").innerHTML = `
          <h2>${data.title}</h2>
          <p>${data.content}</p>
        `;
      };

      list.appendChild(div);
    });
  });
}

/* 첫 화면 안내 */
function showIntro() {
  document.getElementById("detailBox").innerHTML = `
    <h2>📌 환영합니다</h2>
    <p>
      안녕하세요. 이 사이트는 한양대학교 ERICA에 재학 중인 유학생들이
      교내 공지와 행사 정보를 보다 쉽게 확인하고 이해할 수 있도록 만든 게시판입니다.
    </p>
    <p>
      더 많은 유학생 지원 프로그램은 한양대학교 국제처 공식 사이트를 참고해 주세요.
    </p>
  `;
}

/* 초기 실행 */
loadNotices();
showIntro();

</script>

</body>
</html>
</html>
