<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>임시 웹사이트</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Pretendard", sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .banner {
      width: 100%;
      background: #1f2937;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      border-bottom: 2px solid #111827;
    }

    .container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 300px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .sidebar-title {
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }

    .notice-item {
      padding: 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: 0.2s;
    }

    .notice-item:hover {
      background: #f0f0f0;
    }

    .notice-item.active {
      background: #e5edff;
      font-weight: bold;
    }

    .content {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      background: #f9fafb;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 20px;
      gap: 10px;
    }

    .notice-title {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .notice-content {
      font-size: 18px;
      line-height: 1.8;
    }

    .notice-content img {
      max-width: 100%;
      border-radius: 12px;
      margin: 20px 0;
    }

    .notice-content table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
    }

    .notice-content th,
    .notice-content td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: left;
    }

    .notice-content th {
      background: #f3f4f6;
    }

    .notice-content ul {
      margin-left: 20px;
      margin-top: 10px;
    }

    .notice-content a {
      color: #2563eb;
      text-decoration: none;
    }

    .notice-content a:hover {
      text-decoration: underline;
    }

    /* 구글 번역 기본 UI 숨기기 */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
    }

    .goog-logo-link,
    .goog-te-gadget span {
      display: none !important;
    }

    .goog-te-gadget {
      font-size: 0;
    }
  </style>
</head>
<body>

  <div class="banner">
    임시 웹사이트
  </div>

  <div class="container">

    <!-- 공지 목록 -->
    <div class="sidebar">
      <div class="sidebar-title">공지 목록</div>

      <div class="notice-item active" onclick="loadNotice(0, this)">
        테스트 공지
      </div>

      <div class="notice-item" onclick="loadNotice(1, this)">
        업데이트 안내
      </div>
    </div>

    <!-- 내용 -->
    <div class="content">

      <div class="top-bar">

        <!-- 번역기 -->
        <div id="google_translate_element"></div>

      </div>

      <div id="noticeArea">
        <div class="notice-title" id="noticeTitle"></div>
        <div class="notice-content" id="noticeContent"></div>
      </div>

    </div>
  </div>

  <script>
    // 공지 데이터
    const notices = [
      {
        title: "테스트 공지",
        content: `
          <p>자동 번역 테스트입니다.</p>

          <img src="https://picsum.photos/800/300">

          <table>
            <tr>
              <th>날짜</th>
              <th>내용</th>
            </tr>

            <tr>
              <td>2026-05-26</td>
              <td>자동 번역 기능 추가</td>
            </tr>

            <tr>
              <td>2026-05-27</td>
              <td>HTML 표 기능 추가</td>
            </tr>
          </table>

          <br>

          <b>지원 기능</b>

          <ul>
            <li>표 삽입</li>
            <li>이미지 삽입</li>
            <li>링크 삽입</li>
            <li>자동 번역</li>
          </ul>

          <br>

          <a href="https://github.com" target="_blank">
            GitHub 바로가기
          </a>
        `
      },

      {
        title: "업데이트 안내",
        content: `
          <p>업데이트 내역입니다.</p>

          <table>
            <tr>
              <th>버전</th>
              <th>변경사항</th>
            </tr>

            <tr>
              <td>1.0</td>
              <td>사이트 생성</td>
            </tr>

            <tr>
              <td>1.1</td>
              <td>자동 번역 기능 추가</td>
            </tr>
          </table>
        `
      }
    ];

    let currentNoticeIndex = 0;

    // 공지 로딩
    function loadNotice(index, element) {
      currentNoticeIndex = index;

      document.querySelectorAll(".notice-item").forEach(item => {
        item.classList.remove("active");
      });

      element.classList.add("active");

      const notice = notices[index];

      document.getElementById("noticeTitle").innerHTML =
        notice.title;

      document.getElementById("noticeContent").innerHTML =
        notice.content;
    }

    // 첫 로딩
    loadNotice(
      0,
      document.querySelector(".notice-item")
    );

    // 구글 번역
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'ko',
        includedLanguages: 'en,ja,zh-CN,ko',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>

  <!-- 구글 번역 API -->
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
