<head>

  <title>ERICA 공지사항</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Pretendard", sans-serif;
    }

    body{
      background:#f4f4f4;
      color:#222;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* 상단 배너 */

    .banner{
      width:100%;
      background:#1f2937;
      color:white;
      padding:20px;
      font-size:28px;
      font-weight:bold;
      text-align:center;
      border-bottom:2px solid #111827;
    }

    /* 메인 */

    .container{
      flex:1;
      display:flex;
      overflow:hidden;
    }

    /* 좌측 */

    .sidebar{
      width:320px;
      background:white;
      border-right:1px solid #ddd;
      overflow-y:auto;
    }

    .sidebar-title{
      padding:18px;
      font-size:20px;
      font-weight:bold;
      border-bottom:1px solid #eee;
      background:#fafafa;
      position:sticky;
      top:0;
      z-index:10;
    }

    .notice-item{
      padding:16px;
      border-bottom:1px solid #eee;
      cursor:pointer;
      transition:0.2s;
      line-height:1.5;
    }

    .notice-item:hover{
      background:#f0f0f0;
    }

    .notice-item.active{
      background:#e5edff;
      font-weight:bold;
    }

    /* 우측 */

    .content{
      flex:1;
      padding:30px;
      padding-right:360px;
      overflow-y:auto;
      background:#f9fafb;
    }

    .top-bar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:20px;
    }

    /* 언어 선택 */

    #languageSwitcher{
      padding:10px 14px;
      border:1px solid #ccc;
      border-radius:10px;
      background:white;
      font-size:15px;
      cursor:pointer;
    }

    .notice-title{
      font-size:34px;
      font-weight:bold;
      margin-bottom:25px;
      line-height:1.4;
    }

    .notice-content{
      font-size:17px;
      line-height:1.9;
      word-break:keep-all;
    }

    /* 표 */

    .notice-content table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:white;
    }

    .notice-content th,
    .notice-content td{
      border:1px solid #ccc;
      padding:12px;
      text-align:left;
      vertical-align:top;
    }

    .notice-content th{
      background:#f3f4f6;
      width:220px;
    }

    /* 리스트 */

    .notice-content ul{
      margin-left:20px;
      margin-top:10px;
    }

    .notice-content li{
      margin-bottom:8px;
    }

    /* 링크 */

    .notice-content a{
      color:#2563eb;
      text-decoration:none;
      font-weight:600;
    }

    .notice-content a:hover{
      text-decoration:underline;
    }

    /* 제목 */

    .notice-content h2{
      margin-top:10px;
      margin-bottom:15px;
      font-size:28px;
    }

    .notice-content h3{
      margin-top:25px;
      margin-bottom:10px;
      font-size:22px;
    }

    /* 이미지 */

    .notice-content img{
      max-width:100%;
      border-radius:12px;
      margin:20px 0;
    }

    /* 구글 번역 UI 제거 */

    .goog-te-banner-frame.skiptranslate{
      display:none !important;
    }

    body{
      top:0 !important;
    }

    .goog-logo-link,
    .goog-te-gadget span{
      display:none !important;
    }

    .goog-te-gadget{
      font-size:0;
    }

    /* 모바일 */

    @media(max-width:900px){

      .container{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
        height:240px;
      }

      .content{
        padding:20px;
      }

      .notice-title{
        font-size:28px;
      }

      .notice-content{
        font-size:16px;
      }

    }
    .international-banner{
      position:fixed;
      right:20px;
      top:50%;
      transform:translateY(-50%);
      width:300px;
      z-index:9999;
      display:block;
    }
    .international-banner img{
      width:100%;
      height:auto;
      display:block;
      border-radius:12px;
      opacity:0.95;
      transition:all .3s ease;
    }
    .international-banner img:hover{
      opacity:1;
      transform:scale(1.05);
    }
    @media(max-width:1200px){
      
      .international-banner{
        display:none;
      }
    
    }
  </style>

    const sidebar = document.querySelector(".sidebar");

    notices.forEach((notice, index) => {

      const item = document.createElement("div");

      item.className = "notice-item";

      if(index === 0){
        item.classList.add("active");
      }

      item.innerText = notice.title;

      item.onclick = () => {

        document.querySelectorAll(".notice-item")
          .forEach(el => el.classList.remove("active"));

        item.classList.add("active");

        loadNotice(index);

      };

      sidebar.appendChild(item);

    });

    // =========================
    // 공지 로딩
    // =========================

    function loadNotice(index){

      const notice = notices[index];

      document.getElementById("noticeTitle").innerHTML =
        notice.title;

      document.getElementById("noticeContent").innerHTML =
        notice.content;

    }

    // 첫 페이지 로딩

    loadNotice(0);
